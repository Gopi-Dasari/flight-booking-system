<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✈️ SkyTicket - Book Your Flight</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/utils/variables.css" />
    <link rel="stylesheet" href="css/utils/mixins.css" />
    <link rel="stylesheet" href="css/utils/animations.css" />
    <link rel="stylesheet" href="css/components/header.css" />
    <link rel="stylesheet" href="css/components/footer.css" />
    <link rel="stylesheet" href="css/components/modal.css" />
    <link rel="stylesheet" href="css/components/flight-card.css" />
    <link rel="stylesheet" href="css/pages/search.css" />
    <link rel="stylesheet" href="css/pages/results.css" />
    <link rel="stylesheet" href="css/pages/booking.css" />
    <link rel="stylesheet" href="css/responsive/mobile.css" />
    <link rel="stylesheet" href="css/responsive/tablet.css" />
    <link rel="stylesheet" href="css/responsive/desktop.css" />
</head>
<body>
    <div id="app">
        <!-- HEADER - Will be loaded from template -->
        <div id="header-container"></div>
        
        <main id="main-content">
            <section id="search-section" class="page-section active" data-page="search">
                <div class="search-container">
                    <div class="search-hero">
                        <h1>Find Your Perfect Flight</h1>
                        <p>Search and book flights at the best prices</p>
                    </div>
                    
                    <div class="search-box">
                        <form id="searchForm">
                            <div class="search-row">
                                <div class="form-group">
                                    <label><i class="fas fa-map-pin"></i> From</label>
                                    <input type="text" id="fromInput" placeholder="City or Airport" value="New York" />
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-map-pin"></i> To</label>
                                    <input type="text" id="toInput" placeholder="City or Airport" value="London" />
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-calendar-alt"></i> Departure</label>
                                    <input type="date" id="departureDate" />
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-users"></i> Passengers</label>
                                    <select id="passengerCount">
                                        <option value="1">1 Adult</option>
                                        <option value="2" selected>2 Adults</option>
                                        <option value="3">3 Adults</option>
                                        <option value="4">4 Adults</option>
                                        <option value="5">5 Adults</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn-search">
                                    <i class="fas fa-search"></i> Search Flights
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="quick-destinations">
                        <h3>Popular Routes</h3>
                        <div class="destination-grid">
                            <div class="dest-card" data-from="New York" data-to="London">
                                <i class="fas fa-plane"></i>
                                <span>NYC → LON</span>
                                <small>From $299</small>
                            </div>
                            <div class="dest-card" data-from="Los Angeles" data-to="Tokyo">
                                <i class="fas fa-plane"></i>
                                <span>LAX → TYO</span>
                                <small>From $499</small>
                            </div>
                            <div class="dest-card" data-from="Chicago" data-to="Paris">
                                <i class="fas fa-plane"></i>
                                <span>CHI → PAR</span>
                                <small>From $399</small>
                            </div>
                            <div class="dest-card" data-from="Miami" data-to="Dubai">
                                <i class="fas fa-plane"></i>
                                <span>MIA → DXB</span>
                                <small>From $599</small>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            
            <section id="results-section" class="page-section" data-page="results">
                <div class="results-container">
                    <div class="results-header">
                        <div>
                            <h2>Available Flights</h2>
                            <p id="resultsInfo">Showing flights</p>
                        </div>
                        <div class="results-controls">
                            <select id="sortFilter">
                                <option value="price">Price: Low to High</option>
                                <option value="price-desc">Price: High to Low</option>
                                <option value="departure">Departure Time</option>
                                <option value="duration">Duration</option>
                            </select>
                        </div>
                    </div>
                    <div id="flightResults" class="flight-results"></div>
                </div>
            </section>
            
            <section id="booking-section" class="page-section" data-page="booking">
                <div class="booking-container">
                    <div class="booking-progress">
                        <div class="step active"><span class="step-number">1</span><span class="step-label">Select Flight</span></div>
                        <div class="step"><span class="step-number">2</span><span class="step-label">Passenger Details</span></div>
                        <div class="step"><span class="step-number">3</span><span class="step-label">Payment</span></div>
                        <div class="step"><span class="step-number">4</span><span class="step-label">Confirmation</span></div>
                    </div>
                    <div id="bookingContent"></div>
                </div>
            </section>
            
            <section id="my-bookings-section" class="page-section" data-page="my-bookings">
                <div class="bookings-container">
                    <h2>My Bookings</h2>
                    <div id="bookingsList"></div>
                </div>
            </section>
        </main>
        
        <div id="footer-container"></div>
        <div id="modal-container"></div>
    </div>
    
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/date-utils.js"></script>
    <script src="js/services/storage.js"></script>
    <script src="js/services/mock-data.js"></script>
    <script src="js/store.js"></script>
    <script src="js/modules/header.js"></script>
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/search.js"></script>
    <script src="js/modules/flights.js"></script>
    <script src="js/modules/booking.js"></script>
    <script src="js/modules/payment.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
