<!-- HEADER TEMPLATE - Clean version with single auth buttons -->
<header id="main-header">
    <div class="header-container">
        <a href="#" class="logo" id="logoLink">
            <i class="fas fa-plane-departure"></i>
            <span>SkyTicket</span>
        </a>
        
        <nav class="nav-menu" id="navMenu">
            <ul>
                <li>
                    <a href="#" class="active" data-page="search">
                        <i class="fas fa-search"></i> Search
                    </a>
                </li>
                <li>
                    <a href="#" data-page="my-bookings">
                        <i class="fas fa-calendar-check"></i> My Bookings
                    </a>
                </li>
            </ul>
            
            <!-- MOBILE AUTH BUTTONS -->
            <div class="auth-buttons mobile" id="mobileAuthButtons">
                <button class="btn-login" id="mobileLoginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="btn-signup" id="mobileSignupBtn">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </div>
        </nav>
        
        <!-- DESKTOP AUTH BUTTONS (Only ONE set) -->
        <div class="auth-buttons" id="authButtons">
            <button class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button class="btn-signup" id="signupBtn">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </div>
        
        <!-- USER PROFILE -->
        <div class="user-profile hidden" id="userProfile">
            <div class="user-avatar" id="userAvatar">JD</div>
            <span class="user-name" id="userName">John Doe</span>
            <i class="fas fa-chevron-down" style="font-size: 12px; color: var(--gray-500);"></i>
            
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="#" data-page="my-bookings">
                    <i class="fas fa-ticket-alt"></i> My Bookings
                </a>
                <div class="divider"></div>
                <a href="#" class="logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
        
        <button class="hamburger" id="hamburgerBtn">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</header>
