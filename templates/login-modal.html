<div id="loginModal" class="modal hidden">
    <div class="modal-content">
        <button class="close-modal" id="closeLoginModal">&times;</button>
        
        <div class="modal-header">
            <i class="fas fa-plane-departure" style="font-size: 2rem; color: var(--secondary);"></i>
            <h2>Welcome Back</h2>
            <p class="text-muted">Sign in to continue your journey</p>
        </div>
        
        <form id="loginForm" class="modal-form">
            <div class="form-group">
                <label>
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
                <span class="error-message" id="loginEmailError"></span>
            </div>
            
            <div class="form-group">
                <label>
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <div class="password-input-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
                    <button type="button" class="toggle-password" data-target="loginPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="error-message" id="loginPasswordError"></span>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" />
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
            
            <div class="form-footer">
                <span>Don't have an account?</span>
                <a href="#" id="switchToSignup">Sign Up</a>
            </div>
        </form>
    </div>
</div>
